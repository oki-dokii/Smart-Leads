services:
  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: smart-leads-mongo
    restart: unless-stopped
    env_file: .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS}
      MONGO_INITDB_DATABASE: smart-leads
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - smart-leads-net
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── API (Express) ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    container_name: smart-leads-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_URL: ${CLIENT_URL}
    ports:
      - '5001:5000'
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - smart-leads-net
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:5000/api/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Client (React + Nginx) ────────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: production
    container_name: smart-leads-client
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      api:
        condition: service_healthy
    networks:
      - smart-leads-net

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local
  mongo_config:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  smart-leads-net:
    driver: bridge
